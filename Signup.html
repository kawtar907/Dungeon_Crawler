<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dungeon Crawler - Register</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<!--- This file is **almost identical** to `index.html` in structure — same head, same body layout
- `<link rel="stylesheet" href="style.css">` — both pages **share the same CSS file** so they look identical without writing styles twice
- `<script src="script.js">` — both pages **share the same JS file** too
- `goToLogin()` — clicking "Enter here" will send the user **back to index.html**
----->
  <div id="app">

    <div class="form-container">
      <h1>🛡️ Register</h1>
      <p class="subtitle">Begin your legend</p>

      <div class="input-group">
        <label>Username</label>
        <input type="text" id="signup-username" placeholder="Choose your hero name...">
      </div>

      <div class="input-group">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="Your scroll address...">
      </div>

      <div class="input-group">
        <label>Password</label>
       <div class="password-wrapper">
        <input type="password" id="signup-password" placeholder="Create a passphrase...">
        <span class="eye-icon" onclick="togglePassword('signup-password', this)">👁️</span>
       </div>
      </div>

      <div class="input-group">
        <label>Confirm Password</label>
       <div class="password-wrapper">
        <input type="password" id="signup-confirm" placeholder="Repeat your passphrase...">
        <span class="eye-icon" onclick="togglePassword('signup-confirm', this)">👁️</span>
       </div>
      </div>

      <button class="btn" onclick="handleSignup()">Begin Adventure</button>

      <p class="toggle-text">Already have an account? <span onclick="goToLogin()">Enter here</span></p>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
