<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dungeon Crawler - Enter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="app">

    <div class="form-container">
      <h1>⚔️ Enter</h1>
      <p class="subtitle">The dungeon awaits, adventurer</p>

      <div class="input-group">
        <label>Username</label>
        <input type="text" id="login-username" placeholder="Your hero name...">
      </div>

    <div class="input-group">
      <label>Password</label>
        <div class="password-wrapper">
      <input type="password" id="login-password" placeholder="Secret passphrase...">
      <span class="eye-icon" onclick="togglePassword('login-password', this)">👁️</span>
        </div>
    </div>

      <button class="btn" onclick="handleLogin()">Enter the Dungeon</button>

      <p class="toggle-text">No account? <span onclick="goToSignup()">Create one</span></p>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
